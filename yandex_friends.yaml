      - "🇷🇺 2GIS-2052"
      - "🇪🇪 PAID-ESTONIA-GRPC"
      - "🇷🇺 NEPAID-RU-SWEDEN"
      - "🇫🇮 PAID-FINLAND"
rules:
  # 1. Локальный и системный трафик
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  
  # 2. Российский трафик (Без зависимости от базы GeoSite)
  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,su,DIRECT
  - DOMAIN-SUFFIX,рф,DIRECT
  - DOMAIN-SUFFIX,yandex.net,DIRECT
  - DOMAIN-SUFFIX,vk.com,DIRECT
  
  # Оставляем GEOIP, так как база стран (geoip.dat) стандартна везде и работает по IP
  - GEOIP,RU,DIRECT
  
  # 3. Всё остальное — в туннель
  - MATCH,🌍 GLOBAL
