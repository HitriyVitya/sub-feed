# 🛡️ ПАТЧ ДЛЯ МОБИЛЬНЫХ СЕТЕЙ (MTU ФИКС)
tun:
  enable: true
  stack: syste
  auto-route: true
  auto-detect-interface: true
  mtu: 1280

