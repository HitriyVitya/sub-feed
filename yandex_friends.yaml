proxy-groups:
  - name: "🔄 AUTO-SURVIVAL"
    type: fallback
    proxies:
      - "🇷🇺 VK-443"
      - "🇷🇺 OZON-8443"
      - "🇷🇺 DZEN-2053"
      - "🇷🇺 WB-2083"
      - "🇷🇺 AVITO-2087"
      - "🇷🇺 RUTUBE-2096"
      - "🇷🇺 OK-2082"
      - "🇷🇺 MEGAMARKET-2222"
      - "🇷🇺 2GIS-2052"
    url: 'http://ya.ru'
    interval: 60
    timeout: 3000

  # Главный переключатель
  - name: 🌍 GLOBAL
    type: select
    proxies:
      - "🔄 AUTO-SURVIVAL"
      - "🇷🇺 VK-443"
      - "🇷🇺 OZON-8443"
      - "🇷🇺 DZEN-2053"
      - "🇷🇺 WB-2083"
      - "🇷🇺 AVITO-2087"
      - "🇷🇺 RUTUBE-2096"
      - "🇷🇺 OK-2082"
      - "🇷🇺 MEGAMARKET-2222"
      - "🇷🇺 2GIS-2052"
 # 🛡️ ПАТЧ ДЛЯ МОБИЛЬНЫХ СЕТЕЙ:
    timeout: 10000  # Даем 10 секунд на прохождение двойного запроса к Яндексу
    lazy: true      # Ядро не будет проверять все 8 портов одновременно при старте
    max-failed-times: 3 # Не выкидывать прокси из группы при случайном обрыве радиоканала
rules:
  - MATCH,🌍 GLOBAL
