proxy-groups:
  - name: "🔄 AUTO-SURVIVAL"
    type: fallback
    proxies:
      - "🇷🇺 VK-443"
      - "🇷🇺 OZON-8443"
      - "🇷🇺 DZEN-2053"
      - "🇷🇺 WB-2083"
      - "🇷🇺 AVITO-2087"
      - "🇷🇺 RUTUBE-2096"
      - "🇷🇺 OK-2082"
      - "🇷🇺 MEGAMARKET-2222"
      - "🇷🇺 2GIS-2052"
      - "🇷🇺 X5 AD"
      - "SS Yandexcloud"
      - "🇫🇮 Icloud"
    url: 'http://ya.ru'
    interval: 60
     # 🛡️ ПАТЧ ДЛЯ МОБИЛОК ДОЛЖЕН БЫТЬ ЗДЕСЬ:
    timeout: 10000
    lazy: true
    max-failed-times: 3

  # Главный переключатель
  - name: 🌍 GLOBAL
    type: select
    proxies:
      - "🔄 AUTO-SURVIVAL"
      - "🇷🇺 VK-443"
      - "🇷🇺 OZON-8443"
      - "🇷🇺 DZEN-2053"
      - "🇷🇺 WB-2083"
      - "🇷🇺 AVITO-2087"
      - "🇷🇺 RUTUBE-2096"
      - "🇷🇺 OK-2082"
      - "🇷🇺 MEGAMARKET-2222"
      - "🇷🇺 2GIS-2052"
      - "🇷🇺 X5 AD"
      - "SS Yandexcloud"
      - "🇫🇮 Icloud"
rules:
  # 1. Локальный и системный трафик
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  
  # 2. Российский трафик (Без зависимости от базы GeoSite)
  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,su,DIRECT
  - DOMAIN-SUFFIX,рф,DIRECT
  - DOMAIN-SUFFIX,yandex.net,DIRECT
  - DOMAIN-SUFFIX,vk.com,DIRECT
  
  # Оставляем GEOIP, так как база стран (geoip.dat) стандартна везде и работает по IP
  - GEOIP,RU,DIRECT
  
  # 3. Всё остальное — в туннель
  - MATCH,🌍 GLOBAL
