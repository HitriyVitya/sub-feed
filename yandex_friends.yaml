proxy-groups:
  - name: "🔄 AUTO-SURVIVAL"
    type: fallback
    proxies:
      - "🇷🇺 VK-443"
      - "🇷🇺 OZON-8443"
      - "🇷🇺 DZEN-2053"
      - "🇷🇺 WB-2083"
      - "🇷🇺 AVITO-2087"
      - "🇷🇺 RUTUBE-2096"
      - "🇷🇺 OK-2082"
      - "🇷🇺 MEGAMARKET-2222"
      - "🇷🇺 2GIS-2052"
      - "🇪🇪 PAID-ESTONIA-GRPC"
      - "🇷🇺 NEPAID-RU-SWEDEN"
      - "🇫🇮 PAID-FINLAND"
    url: 'http://ya.ru'
    interval: 60
     # 🛡️ ПАТЧ ДЛЯ МОБИЛОК ДОЛЖЕН БЫТЬ ЗДЕСЬ:
    timeout: 10000
    lazy: true
    max-failed-times: 3

  # Главный переключатель
  - name: 🌍 GLOBAL
    type: select
    proxies:
      - "🔄 AUTO-SURVIVAL"
      - "🇷🇺 VK-443"
      - "🇷🇺 OZON-8443"
      - "🇷🇺 DZEN-2053"
      - "🇷🇺 WB-2083"
      - "🇷🇺 AVITO-2087"
      - "🇷🇺 RUTUBE-2096"
      - "🇷🇺 OK-2082"
